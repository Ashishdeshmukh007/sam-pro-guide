<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<style>
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#07090e;color:#e9edf4;padding:70px 76px;position:relative;overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .field{position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(46% 40% at 8% 4%,rgba(25,223,168,.30),transparent 60%),
      radial-gradient(42% 38% at 96% 14%,rgba(34,211,238,.22),transparent 60%),
      radial-gradient(50% 44% at 88% 96%,rgba(125,143,255,.20),transparent 65%);}
  .grid{position:absolute;inset:0;z-index:0;opacity:.5;
    background:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:52px 52px;
    -webkit-mask-image:radial-gradient(80% 90% at 24% 8%,#000,transparent 72%);}
  .top,.mid,.bot{position:relative;z-index:1}
  .badge{display:inline-flex;align-items:center;gap:12px;border:1px solid rgba(25,223,168,.4);
    background:rgba(25,223,168,.1);color:#19dfa8;border-radius:999px;padding:11px 22px;
    font-size:22px;font-weight:800;letter-spacing:.14em}
  .dot{width:12px;height:12px;border-radius:50%;background:#19dfa8;box-shadow:0 0 14px #19dfa8}
  h1{font-size:88px;line-height:1.02;font-weight:800;letter-spacing:-.02em;margin:26px 0 20px}
  h1 .g{background:linear-gradient(100deg,#19dfa8,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:31px;line-height:1.4;color:#aeb6c4;max-width:20ch}
  .sub b{color:#e9edf4}
  .bot{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .chip{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);border-radius:12px;
    padding:12px 20px;font-size:24px;font-weight:600;color:#cfd6e2}
  .chip b{color:#19dfa8}
  .url{margin-left:auto;font-size:24px;color:#8f99a9;font-weight:600}
</style></head>
<body>
  <div class="field"></div><div class="grid"></div>
  <div class="top"><span class="badge"><span class="dot"></span>ZERO → MASTERY · VISUAL GUIDE</span></div>
  <div class="mid">
    <h1>ServiceNow <span class="g">SAM Pro</span></h1>
    <div class="sub">Microsoft, Oracle &amp; IBM licensing, the reconciliation engine, and <b>140 interview questions</b>.</div>
  </div>
  <div class="bot">
    <span class="chip"><b>11</b>&nbsp;parts</span>
    <span class="chip"><b>8</b>&nbsp;case studies</span>
    <span class="chip"><b>140</b>&nbsp;Q&amp;A</span>
    <span class="url">ashishdeshmukh007.github.io/sam-pro-guide</span>
  </div>
</body></html>
